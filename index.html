<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#111827" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Siege Forge" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />
  <title>Siege Forge</title>
  <link rel="stylesheet" href="src/styles.css" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div>
        <h1>Siege Forge</h1>
        <p id="subtitle">Phase 1.5 · polished tower defense PWA</p>
      </div>
      <button id="installBtn" class="ghost hidden">Install</button>
    </header>

    <main>
      <section id="menu" class="panel screen active">
        <div class="menu-head">
          <div>
            <h2>Choose a Realm</h2>
            <p class="muted">Tap a map, place towers on green pads, and build one strong kill zone.</p>
          </div>
          <div class="legend-card">
            <b>Tip</b>
            <span>Frost before Cannon/Flame is the safest combo.</span>
          </div>
        </div>
        <div id="mapGrid" class="map-grid"></div>
      </section>

      <section id="game" class="screen">
        <div class="hud panel">
          <div class="stat-pill map-pill"><span>Map</span><b id="mapName">Grass Path</b></div>
          <div class="stat-pill"><span>Wave</span><b id="waveText">1</b></div>
          <div class="stat-pill gold"><span>Gold</span><b id="goldText">150</b></div>
          <div class="stat-pill lives"><span>Lives</span><b id="livesText">20</b></div>
          <div class="stat-pill"><span>Score</span><b id="scoreText">0</b></div>
          <div class="actions">
            <button id="startWaveBtn">Start Wave</button>
            <button id="speedBtn" class="ghost">Speed x1</button>
            <button id="pauseBtn" class="ghost">Pause</button>
            <button id="backBtn" class="ghost">Maps</button>
          </div>
        </div>

        <div class="board-wrap">
          <canvas id="gameCanvas" width="960" height="540" aria-label="Siege Forge game board"></canvas>
          <div id="toast" class="toast hidden"></div>
        </div>

        <div id="infoPanel" class="info-panel panel hidden"></div>
        <div id="buildPanel" class="build-panel panel hidden"></div>
      </section>
    </main>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
