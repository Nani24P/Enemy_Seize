<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0b1020" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Siege Forge" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />
  <title>Siege Forge</title>
  <link rel="stylesheet" href="src/styles.css" />
</head>
<body>
  <div class="aurora aurora-one"></div>
  <div class="aurora aurora-two"></div>

  <div id="app">
    <header class="topbar glass compact">
      <div class="brand-lockup">
        <div class="brand-badge">⚒️</div>
        <div>
          <h1>Siege Forge</h1>
          <div class="icon-row" aria-label="Tower icons and themes"><span>🏹</span><span>💣</span><span>❄️</span><span>🔥</span><span>⚡</span></div>
        </div>
      </div>
      <div class="top-actions">
        <button id="profileBtn" class="ghost icon-btn" aria-label="Profile">👤</button>
        <button id="codexBtn" class="ghost icon-btn" aria-label="Codex">📖</button>
        <button id="settingsBtn" class="ghost icon-btn" aria-label="Settings">⚙️</button>
        <button id="installBtn" class="ghost icon-btn hidden" aria-label="Install app">⬇️</button>
      </div>
    </header>

    <main>
      <section id="menu" class="panel screen active simple-menu">
        <div class="menu-strip">
          <span class="menu-chip">🗺️ 3 Maps</span>
          <span class="menu-chip">⭐ Star Runs</span>
          <span class="menu-chip">🎵 Sound</span>
          <span class="menu-chip">📱 Offline Ready</span>
        </div>
        <div id="mapGrid" class="map-grid"></div>
      </section>

      <section id="game" class="screen">
        <div class="hud panel">
          <div class="hud-left">
            <div class="map-chip"><span>Realm</span><b id="mapName">Jungle Trail</b></div>
            <div class="stat-pill"><span>Wave</span><b id="waveText">1</b></div>
            <div class="stat-pill gold"><span>Gold</span><b id="goldText">180</b></div>
            <div class="stat-pill lives"><span>Lives</span><b id="livesText">20</b></div>
            <div class="stat-pill"><span>Score</span><b id="scoreText">0</b></div>
          </div>
          <div class="actions">
            <button id="startWaveBtn">▶ Wave</button>
            <button id="speedBtn" class="ghost">⏩ x1</button>
            <button id="pauseBtn" class="ghost">⏸</button>
            <button id="backBtn" class="ghost">🗺</button>
          </div>
        </div>

        <div class="meta-row">
          <div id="wavePreview" class="panel wave-preview"></div>
        </div>

        <div class="game-layout">
          <div class="board-wrap panel">
            <canvas id="gameCanvas" width="960" height="540" aria-label="Siege Forge game board"></canvas>
            <div id="toast" class="toast hidden"></div>
            <div id="infoPanel" class="tower-popover hidden"></div>
            <div class="board-help">Tap green pads · tap towers for the floating forge menu</div>
          </div>
        </div>

        <div id="buildPanel" class="build-panel panel hidden"></div>
      </section>
    </main>
  </div>

  <div id="settingsModal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" data-close-modal="true"></div>
    <div class="modal-card panel">
      <div class="modal-head"><div><div class="eyebrow">Settings</div><h2>Game Options</h2></div><button id="closeSettingsBtn" class="ghost icon-btn">✕</button></div>
      <div class="setting-list">
        <button id="toggleSoundBtn" class="setting-row ghost"></button>
        <button id="toggleMusicBtn" class="setting-row ghost"></button>
        <button id="toggleMotionBtn" class="setting-row ghost"></button>
        <button id="toggleDamageBtn" class="setting-row ghost"></button>
        <div class="setting-meta"><span>App Version</span><b>v2.2 · Three Realms</b></div>
        <button id="resetProgressBtn" class="ghost danger-btn">Reset Current Slot</button>
      </div>
    </div>
  </div>

  <div id="codexModal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" data-close-codex="true"></div>
    <div class="modal-card panel large-modal">
      <div class="modal-head"><div><div class="eyebrow">Codex</div><h2>Towers & Veggies</h2></div><button id="closeCodexBtn" class="ghost icon-btn">✕</button></div>
      <div id="codexContent" class="codex-grid"></div>
    </div>
  </div>

  <div id="profileModal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" data-close-profile="true"></div>
    <div class="modal-card panel large-modal">
      <div class="modal-head"><div><div class="eyebrow">Profile</div><h2>Save Slots</h2></div><button id="closeProfileBtn" class="ghost icon-btn">✕</button></div>
      <div id="profileContent"></div>
    </div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
