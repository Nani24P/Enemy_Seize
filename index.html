<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0b1020" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Siege Forge" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />
  <title>Siege Forge</title>
  <link rel="stylesheet" href="src/styles.css" />
</head>
<body>
  <div class="aurora aurora-one"></div>
  <div class="aurora aurora-two"></div>

  <div id="app">
    <header class="topbar glass compact">
      <div class="brand-lockup">
        <div class="brand-badge">⚒️</div>
        <div>
          <h1>Siege Forge</h1>
          <div class="icon-row"><span>🏹</span><span>💣</span><span>❄️</span><span>🔥</span><span>⚡</span></div>
        </div>
      </div>
      <button id="installBtn" class="ghost hidden">⬇️</button>
    </header>

    <main>
      <section id="menu" class="panel screen active simple-menu">
        <div class="menu-strip">
          <span class="menu-chip">🗺️ 5 Maps</span>
          <span class="menu-chip">🥕 Veggie Waves</span>
          <span class="menu-chip">📱 PWA</span>
        </div>
        <div id="mapGrid" class="map-grid"></div>
      </section>

      <section id="game" class="screen">
        <div class="hud panel">
          <div class="hud-left">
            <div class="map-chip"><span>Realm</span><b id="mapName">Forest Trail</b></div>
            <div class="stat-pill"><span>Wave</span><b id="waveText">1</b></div>
            <div class="stat-pill gold"><span>Gold</span><b id="goldText">180</b></div>
            <div class="stat-pill lives"><span>Lives</span><b id="livesText">20</b></div>
            <div class="stat-pill"><span>Score</span><b id="scoreText">0</b></div>
          </div>
          <div class="actions">
            <button id="startWaveBtn" class="primary-action">▶ Wave</button>
            <button id="speedBtn" class="ghost">⏩ x1</button>
            <button id="pauseBtn" class="ghost">⏸</button>
            <button id="backBtn" class="ghost">🗺</button>
          </div>
        </div>

        <div class="game-layout">
          <div class="board-wrap panel">
            <canvas id="gameCanvas" width="960" height="540" aria-label="Siege Forge game board"></canvas>
            <div id="toast" class="toast hidden"></div>
            <div id="infoPanel" class="tower-popover hidden"></div>
            <div class="board-help">Tap green pads · tap towers for the floating forge menu</div>
          </div>
        </div>

        <div id="buildPanel" class="build-panel panel hidden"></div>
      </section>
    </main>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
